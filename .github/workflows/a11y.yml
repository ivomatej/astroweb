name: a11y

# Automatická kontrola přístupnosti (axe-core / WCAG 2.1 AA) nad vybuilděnými
# stránkami recenzeru. Build běží ve fallback režimu (bez backendu) → bez klíčů.
# @axe-core/cli s aktuálním axe-core (zvládá pozadí přes CSS proměnné).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci || npm install

      - name: Build (fallback, bez backendu)
        run: npm run build

      - name: Accessibility check (axe-core, WCAG 2.1 AA)
        run: |
          npm run preview -- --port 4321 --host &
          npx --yes wait-on -t 60000 http://localhost:4321/
          npx --yes @axe-core/cli@4 \
            http://localhost:4321/ \
            http://localhost:4321/hledat/ \
            http://localhost:4321/kontakt/ \
            --tags wcag2a,wcag2aa \
            --exit
