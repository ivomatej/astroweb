name: a11y

# Automatická kontrola přístupnosti (axe / WCAG 2.1 AA) nad vybuilděnými
# stránkami recenzeru. Build běží ve fallback režimu (bez backendu) → bez tajných
# klíčů. Práh issues je v .pa11yci.json (threshold) — startovní baseline, snižovat.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pa11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci || npm install

      - name: Build (fallback, bez backendu)
        run: npm run build

      - name: Accessibility check (pa11y-ci + axe)
        run: |
          npm run preview -- --port 4321 --host &
          npx --yes wait-on -t 60000 http://localhost:4321/
          npx --yes pa11y-ci@3
