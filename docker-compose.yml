# Local development setup for the Astro site.
# Run `docker compose up` to start the dev server on http://localhost:4321
# with hot module reload — file changes on the host are picked up
# instantly inside the container.

services:
  astro:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: recenzer-astro-dev
    ports:
      - "4321:4321"
    volumes:
      # Mount source code from host into container so HMR works
      - .:/app
      # Use a named volume for node_modules so the host's tree
      # (which may have macOS-specific binaries) doesn't override
      # the container's Linux install.
      - astro_node_modules:/app/node_modules
      # Same for the Astro cache
      - astro_dotastro:/app/.astro
    environment:
      # Tell Vite to watch via polling — Docker on macOS sometimes
      # misses inotify events from bind mounts.
      - CHOKIDAR_USEPOLLING=true
      # Astro listens on 0.0.0.0 (set via --host in package.json script)
      - HOST=0.0.0.0
    # Keep STDIN open and allocate a TTY so the dev server's
    # interactive output renders cleanly when attached.
    stdin_open: true
    tty: true

volumes:
  astro_node_modules:
  astro_dotastro:
